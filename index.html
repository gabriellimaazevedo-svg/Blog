<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <style>
        header {
           background-color: #183C63;
           color: #FFFFFF;
           text-align: center;
           max-width: 800px;
           margin: 0 auto;
           padding: 16px;
        }
        main {
           background-color: #FFFFFF;
           color: #183C63;
           max-width: 800px;
           margin: 0 auto;
           padding: 16px;
           display: flex;
        }
            img {
                width: 80px;
                height: 80px;
            }
            .artigo-autor {
    font-weight: bold;
            }

    </style>
</head>
<body>
    <header>
     <h1>Meu blog tech</h1>
     <p>Vou compartilhar conhecimentos sobre tecnologia e programação</p>
    </header>
    <main>
        <img src="logodoblog.jpeg" alt="Um escudo heráldico estilizado com ícones coloridos divididos em quatro quadrantes. O escudo tem uma moldura azul escura e um fundo com um padrão de circuito de placa-mãe.">
        <div>
            <h2>Meu primeiro post</h2>
            <p class="artigo-autor">Por: Gabriel de Lima</p>
            <p>Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas de programação e curiosidades da área de tecnologia.</p>
            <button>❤️<span>0</span></button>
            <button>👍<span>0</span></button>
        </div>
    </main>
 </body>
 <script>
    const botao = document.querySelector("button");
    
    botoes.forEach(function(botao) {
            botao.addEventListener("click", botaoClicado);
            function botaoClicado() {
              console.log("fui clicado");
              let texto = botao.querySelector("span");
              texto.textContent++;
            }
    });

 </script>
</html>
